services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8089:80/tcp"
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - TZ=Europe/Rome
      - WEBPASSWORD=${WEBPASSWORD}
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
